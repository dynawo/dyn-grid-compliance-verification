[DEFAULT]
# Note: Some parameters defined in this INI file (e.g., Pmax, Qmin, Qmax, UNom)
# may also appear in the Dynawo *.PAR input. Users must ensure consistency between both sources.
# Please review both files to avoid conflicting definitions.

# p_{max_unite} injection as defined by the DTR in MW (expected value >= 0.0)
p_max_injection = 456.7
# u_nom is the nominal voltage in the PDR Bus (in kV)
# Allowed values: 400, 225, 150, 90, 63 (land) and 132, 66 (offshore)
u_nom = 225
# s_nom is the nominal apparent power of the generator unit (in MVA)
s_nom = 555
# q_max is the maximum reactive power of the generator unit (in MVar)
q_max = 100
# q_min is the minimum reactive power of the generator unit (in MVar)
q_min = -100
# topology
topology = S+Aux
# Generator type in the original network (SM, PPM or BESS)
generator_type = SM
