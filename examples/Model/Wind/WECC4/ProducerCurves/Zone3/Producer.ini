[DEFAULT]
# p_{max_unite} injection as defined by the DTR in MW
p_max_injection_at_PDR = 75
# u_nom is the nominal voltage at the PDR bus (in kV)
# Allowed values: 400, 225, 150, 90, 63 (land) and 132, 66 (offshore)
u_nom_at_PDR = 225
# q_max is the maximum reactive power at the PDR bus (in MVar)
q_max_at_PDR = 40
# q_min is the minimum reactive power at the PDR bus (in MVar)
q_min_at_PDR = -40
# topology
topology = M+Aux
# Active power sharing per generator unit (fraction). Values must be between 0.0 and 1.0
P_sharing_Wind_Turbine1 = 0.5
# Reactive power sharing per generator unit (fraction). Values must be between 0.0 and 1.0
Q_sharing_Wind_Turbine1 = 0.5
# Active power sharing per generator unit (fraction). Values must be between 0.0 and 1.0
P_sharing_Wind_Turbine2 = 0.5
# Reactive power sharing per generator unit (fraction). Values must be between 0.0 and 1.0
Q_sharing_Wind_Turbine2 = 0.5
