name: Dev CI

on:
  pull_request:
    branches:
    - main

jobs:
  build:

    name: Build OS ${{ matrix.os}} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install requirements
        run: |
          uv pip install flake8 pytest pytest-mock pytest-cov

      - name: Build
        run: uv build

      - name: Linting with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src --count --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 99 chars wide
          flake8 src --count --exit-zero --statistics --max-complexity=10 
          
      # - name: Run tests
      #   run: uv run pytest

      - name: Generate coverage
        run: uv run pytest --cov=. --cov-report=xml 

