
name: Dev CI

on:
  pull_request:

# Cancel in-progress runs for the same PR branch (saves minutes)
concurrency:
  group: dev-ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege permissions; adjust if you later need to push tags, etc.
permissions:
  contents: read

jobs:
  build:
    name: Build OS ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install uv and enable its cache on the runner
      - name: Install uv
        uses: astral-sh/setup-uv@v2

      # Install the desired Python version via uv (isolated from system Python)
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Create a virtual environment in .venv (uv run will pick it up automatically)
      - name: Create venv
        run: uv venv

      # Install your project with both dev and test extras from pyproject.toml
      - name: Install dev & test dependencies
        run: uv pip install -e ".[dev,test]"

      # 🔧 Build toolchain fix: ensure packaging tools exist before building
      - name: Install build toolchain
        run: uv pip install --upgrade build setuptools wheel

      # Lint with Ruff (as configured in your pyproject.toml)
      - name: Lint with Ruff
        run: |
          uv run ruff --version
          uv run ruff check src --output-format=github

      # If you prefer Flake8 instead of Ruff, use uvx (tool-on-demand) and comment the Ruff step:
      # - name: Lint with flake8 (uvx)
      #   run: |
      #     uvx -q flake8 --version
      #     # Stop the build if there are Python syntax errors or undefined names
      #     uvx -q flake8 src --count --show-source --statistics
      #     # Treat style issues as warnings (exit-zero), still display them
      #     uvx -q flake8 src --count --exit-zero --statistics --max-complexity=10

      # Build a wheel using the venv-managed Python
      - name: Build package (wheel)
        run: uv run python -m build --wheel

      # Install the built wheel so tests run against the actual artifact
      - name: Install wheel
        run: uv pip install dist/*.whl

      # Run tests (pytest, pytest-mock, pytest-cov come from your [test] extras)
      - name: Test
        run: uv run pytest -q --color=yes

      # Generate coverage in a deterministic filename for downstream tools (Codecov, Sonar, etc.)
      - name: Coverage (XML)
        run: uv run pytest --cov=. --cov-report=xml:coverage.xml

      # Upload wheel as an artifact (handy for downloading and testing locally)
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
