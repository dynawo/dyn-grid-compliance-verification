
name: Dev CI

on:
  pull_request:

concurrency:
  group: dev-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OS ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install uv and enable its cache
      - name: Install uv
        uses: astral-sh/setup-uv@v2

      # Install Python with uv
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Create venv (uv will use it with `uv run`)
      - name: Create venv
        run: uv venv

      # Install dev & test deps from your pyproject extras
      - name: Install dev & test dependencies
        run: uv pip install -e ".[dev,test]"

      # Ensure packaging toolchain (fix for `python -m build`)
      - name: Install build toolchain
        run: uv pip install --upgrade build setuptools wheel

      # Lint with Ruff (consistent with your pyproject.toml)
      - name: Lint with Ruff
        run: |
          uv run ruff --version
          uv run ruff check src --output-format=github

      # Build the wheel
      - name: Build package (wheel)
        run: uv run python -m build --wheel

      # Install wheel on Linux/macOS (bash expands glob)
      - name: Install wheel (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: uv pip install dist/*.whl

      # Install wheel on Windows (PowerShell enumerates the file)
      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1 -ExpandProperty FullName
          if (-not $wheel) {
            Write-Error "No wheel found in dist/"
          }
          Write-Host "Installing wheel: $wheel"
          uv pip install "$wheel"

      # Run tests
      - name: Test
        run: uv run pytest -q --color=yes

           # Coverage (XML)
      - name: Coverage (XML)
        run: uv run pytest --cov=src --cov-report=xml