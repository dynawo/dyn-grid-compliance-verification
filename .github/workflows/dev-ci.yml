
name: Dev CI

on:
  pull_request:

concurrency:
  group: dev-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OS ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv

      # Install your project with dev and test extras from pyproject.toml
      - name: Install dev & test dependencies
        run: uv pip install -e ".[dev,test]"

      # Lint with Ruff (consistent with your pyproject config)
      - name: Lint with Ruff
        run: |
          # Show version to verify availability
          uv run ruff --version
          # Lint (uses E/F/W/I as configured)
          uv run ruff check src --output-format=github

      # Build wheel
      - name: Build package (wheel)
        run: uv run python -m build --wheel

      # Install the built wheel (tests run against installed artifact)
      - name: Install wheel
        run: uv pip install dist/*.whl

      # Tests (pytest + pytest-mock + pytest-cov are in [test] extras)
      - name: Test
        run: uv run pytest -q --color=yes

      # Coverage report in a deterministic filename
      - name: Coverage (XML)
        run: uv run pytest --cov=. --cov-report=xml:coverage.xml

      # Upload wheel      # Upload wheel as artifact (handy for debugging)
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
