[PCS_RTE-IGFM1]
# PCS Id, Used to sort the final report
id = 9999

# Common parameters
# Minimum ratio for parameter variations
RatioMin = 0.9
# Maximum ratio for parameter variations
RatioMax = 1.1
# Base angular frequency (radians/second)
Wb = 314
# Grid RMS voltage (pu)
Ugr = 1.0
# Upper margin for power envelopes
MarginHigh = 0.5
# Lower margin for power envelopes 
MarginLow = 0.5
# Parameter for tunnel function
FinalAllowedTunnelVariation = 0.05
# Parameter for tunnel function
FinalAllowedTunnelPn = 0.02

[PCS-Benchmarks]
PCS_RTE-IGFM1 = S_VolAngStep1,S_VolAngStep2,S_VolAngStep3,S_VolAngStep4

[PCS-OperatingConditions]
# Updated to OC1-OC5 per PDF Section Test 1 
PCS_RTE-IGFM1.S_VolAngStep1 = OC1,OC2,OC3,OC4,OC5
PCS_RTE-IGFM1.S_VolAngStep2 = OC1,OC2,OC3,OC4,OC5
PCS_RTE-IGFM1.S_VolAngStep3 = OC1,OC2,OC3,OC4,OC5
PCS_RTE-IGFM1.S_VolAngStep4 = OC1,OC2,OC3,OC4,OC5

[PCS_RTE-IGFM1.S_VolAngStep1]
# Job name to apply in the JOBS file
job_name = PCS IGFM - GFM behavior (phase jump)
# TSO model side
TSO_model = TestBench1
# calculator name
calculator = PhaseJump

# Scenario parameters
DeltaPhase = 0.3*(Xeff+Xgrid)
SCR = SCRmax

[PCS_RTE-IGFM1.S_VolAngStep1.OC1]
inherit = PlantOC1

[PCS_RTE-IGFM1.S_VolAngStep1.OC2]
inherit = PlantOC2

[PCS_RTE-IGFM1.S_VolAngStep1.OC3]
inherit = PlantOC3

[PCS_RTE-IGFM1.S_VolAngStep1.OC4]
inherit = PlantOC4

[PCS_RTE-IGFM1.S_VolAngStep1.OC5]
inherit = PlantOC5

