# There are three ways to define a PCS configuration section:
#
# 1. Standard definition (no inheritance):
#    All parameters are defined directly.
#    [MySection]
#    P0 = 0.5
#    Q0 = 0
#
# 2. Full inheritance:
#    The section only contains the 'inherit' key. All values are
#    loaded from the specified alias section.
#    [MySection]
#    inherit = MyAlias
#
# 3. Inheritance with override:
#    The section inherits from an alias but also defines specific
#    parameters. These local parameters will override the inherited ones.
#    [MySection]
#    inherit = MyAlias
#    Q0 = 0.1  # This value overrides Q0 from MyAlias

[PlantOC1]
# Description: P=0, Q=0
P0 = 0
Q0 = 0
U0 = 1
SoCBattery = 0.5

[PlantOC2]
# Description: P=0.5 Pn, Q=0
P0 = 0.5*Pmax
Q0 = 0
U0 = 1
SoCBattery = 0.5

[PlantOC3]
# Description: P=-0.5 Pn, Q=0
P0 = -0.5*Pmax
Q0 = 0
U0 = 1
SoCBattery = 0.5

[PlantOC4]
# Description: P=0.95 Pn, Q=0
P0 = 0.95*Pmax
Q0 = 0
U0 = 1
SoCBattery = 0.5

[PlantOC5]
# Description: P=-0.95 Pn, Q=0
P0 = -0.95*Pmax
Q0 = 0
U0 = 1
SoCBattery = 0.5

[PlantOC6]
# Description: P=0, Q = -Qmax = -0.3 Pn (Inductive/Absorption)
P0 = 0
Q0 = -0.3*Qmax
U0 = 1
SoCBattery = 0.5

[PlantOC7]
# Description: P=0, Q = +Qmax = 0.3 Pn (Capacitive/Injection)
P0 = 0
Q0 = 0.3*Qmax
U0 = 1
SoCBattery = 0.5